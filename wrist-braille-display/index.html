<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Wrist Braille Display | Amber Sahdev</title>
    <meta name="description" content="Wrist Braille Display project by Amber Sahdev.">
    <meta name="author" content="Amber Sahdev">
    <link rel="canonical" href="https://ambersah.dev/wrist-braille-display/">
    <link rel="icon" href="/resources/preview.png" type="image/png">
    <link rel="stylesheet" type="text/css" href="/static/style.css?v=28">

    <style>
        body {
            margin: 0;
        }
        .project-page {
            box-sizing: border-box;
            margin: 40px auto 44px;
            max-width: 1060px;
            padding: 0 20px;
            text-align: left;
        }
        .project-nav {
            display: inline-block;
            font-size: 15px;
            margin-bottom: 18px;
        }
        .braille-board {
            padding: 20px 28px;
        }
        .project-title {
            font-size: 32px;
            font-weight: 500;
            margin: 0 0 14px;
        }
        .project-facts {
            margin: 0;
            padding-left: 22px;
        }
        .project-facts li {
            line-height: 1.55;
            margin-bottom: 4px;
        }
        .flow-step,
        .flow-arrow {
            white-space: nowrap;
        }
        .flow-arrow {
            margin: 0 2px;
        }
        .collage-grid {
            display: grid;
            gap: 18px;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            margin: clamp(34px, 8vw, 64px) auto 0;
            max-width: 900px;
        }
        .collage-item {
            margin: 0;
        }
        .collage-item figcaption {
            color: #333;
            font-size: 14px;
            line-height: 1.3;
            margin-top: 8px;
        }
        .collage-item img,
        .image-modal img {
            border-radius: 4px;
        }
        .collage-item img {
            border: 1px solid rgba(0, 0, 0, 0.18);
            box-sizing: border-box;
            cursor: zoom-in;
            display: block;
            height: auto;
            width: 100%;
        }
        .image-modal {
            align-items: center;
            background: rgba(255, 255, 255, 0.94);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            inset: 0;
            justify-content: center;
            padding: 24px;
            position: fixed;
            z-index: 1000;
        }
        .image-modal[hidden] {
            display: none;
        }
        .image-modal img {
            border: 3px solid black;
            cursor: pointer;
            max-height: 88vh;
            max-width: 94vw;
        }
        .image-modal-close {
            background: transparent;
            border: 0;
            color: #111;
            cursor: pointer;
            font-size: 32px;
            line-height: 1;
            padding: 8px;
            position: fixed;
            right: 16px;
            top: 12px;
        }
        .image-modal-nav {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.24);
            border-radius: 999px;
            color: #111;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            min-height: 38px;
            min-width: 52px;
            padding: 6px 16px 8px;
        }
        .image-modal-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 14px;
        }
        .collage-one,
        .collage-three {
            grid-column: 1;
        }
        .collage-two {
            align-self: center;
            grid-column: 2;
            grid-row: 1 / 3;
        }
        .collage-three {
            grid-row: 2;
        }
        @media (max-width: 760px) {
            .project-page {
                margin-top: 30px;
            }
            .braille-board {
                padding: 18px 0 34px;
            }
            .project-title {
                font-size: 26px;
                line-height: 1.15;
            }
            .project-facts {
                font-size: 16px;
                padding-left: 20px;
            }
            .project-facts li {
                line-height: 1.45;
                margin-bottom: 6px;
            }
            .flow-arrow { margin: 0 1px; }
        }
    </style>
</head>
<body>
<div class="colorbar-container">
    <img src="/resources/colorbar.png" alt="Color Bar" class="colorbar-img"/>
</div>

<main class="project-page">
    <a class="project-nav" href="/">&larr; Back to <b>AmberSah.dev</b></a>

    <section class="braille-board" aria-labelledby="project-title">
        <h1 class="project-title" id="project-title">Wrist Braille Display</h1>

        <ul class="project-facts">
            <li>2014</li>
            <li>$20</li>
            <li>430 million people worldwide with nerve deafness, left out of conversations without interpreters or captions</li>
            <li><span class="flow-step">Android</span> <span class="flow-arrow">&rarr;</span> <span class="flow-step">Live Speech-to-Text</span> <span class="flow-arrow">&rarr;</span> <span class="flow-step">Bluetooth</span> <span class="flow-arrow">&rarr;</span> <span class="flow-step">Arduino</span> <span class="flow-arrow">&rarr;</span> <span class="flow-step">Servo Motors</span> <span class="flow-arrow">&rarr;</span> <span class="flow-step">Wrist</span></li>
        </ul>

        <div class="collage-grid">
            <figure class="collage-item collage-one">
                <img src="/resources/braille/1.JPG" alt="Arduino, breadboard, wires, and servo motors for the braille display" loading="lazy">
            </figure>
            <figure class="collage-item collage-two">
                <img src="/resources/braille/2.jpeg" alt="Wrist-mounted braille display prototype with servo motors" loading="lazy">
                <figcaption><center><span class="intro-name">2025</span> - Random picture I took while moving</center></figcaption>
            </figure>
            <figure class="collage-item collage-three">
                <img src="/resources/braille/3.JPG" alt="Breadboard and Arduino wiring for the wrist braille display prototype" loading="lazy">
                <figcaption><center><span class="intro-name">2014</span> - Best pictures I could take with my desktop's webcam</center></figcaption>
            </figure>
        </div>
    </section>
</main>
<div class="image-modal" id="image-modal" role="dialog" aria-modal="true" hidden>
    <button class="image-modal-close" type="button" aria-label="Close image">&times;</button>
    <img src="" alt="">
    <div class="image-modal-controls">
        <button class="image-modal-nav image-modal-prev" type="button" aria-label="Previous image">&larr;</button>
        <button class="image-modal-nav image-modal-next" type="button" aria-label="Next image">&rarr;</button>
    </div>
</div>
<script>
    (() => {
        const modal = document.getElementById('image-modal');
        const modalImage = modal.querySelector('img');
        const images = Array.from(document.querySelectorAll('.collage-grid img'));
        let activeIndex = 0;
        let swipeStartX = null;
        let didSwipe = false;

        const showImage = (index) => {
            activeIndex = (index + images.length) % images.length;
            const image = images[activeIndex];

            modalImage.src = image.currentSrc || image.src;
            modalImage.alt = image.alt;
        };

        const openModal = (index) => {
            showImage(index);
            modal.hidden = false;
        };

        const closeModal = () => {
            modal.hidden = true;
            modalImage.removeAttribute('src');
            modalImage.alt = '';
        };

        document.querySelector('.collage-grid').addEventListener('click', (event) => {
            const image = event.target.closest('img');
            if (!image) return;

            openModal(images.indexOf(image));
        });

        modalImage.addEventListener('click', () => {
            if (didSwipe) {
                didSwipe = false;
                return;
            }

            showImage(activeIndex + 1);
        });

        modalImage.addEventListener('touchstart', (event) => {
            swipeStartX = event.changedTouches[0].clientX;
        });

        modalImage.addEventListener('touchend', (event) => {
            if (swipeStartX === null) return;

            const deltaX = event.changedTouches[0].clientX - swipeStartX;
            swipeStartX = null;
            if (Math.abs(deltaX) < 35) return;

            didSwipe = true;
            showImage(activeIndex + (deltaX < 0 ? 1 : -1));
        });

        modal.addEventListener('click', (event) => {
            if (event.target.closest('.image-modal-prev')) {
                showImage(activeIndex - 1);
            } else if (event.target.closest('.image-modal-next')) {
                showImage(activeIndex + 1);
            } else if (event.target === modal || event.target.closest('.image-modal-close')) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (modal.hidden) return;

            if (event.key === 'Escape') {
                closeModal();
            } else if (event.key === 'ArrowRight') {
                showImage(activeIndex + 1);
            } else if (event.key === 'ArrowLeft') {
                showImage(activeIndex - 1);
            }
        });
    })();
</script>
<script src="/static/analytics.js" defer></script>
</body>
</html>
